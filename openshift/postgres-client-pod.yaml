apiVersion: v1
kind: Pod
metadata:
  name: postgres-client
  namespace: rhsi-v2-demo
  labels:
    app: postgres-client
spec:
  containers:
  - name: postgres-client
    image: postgres:15
    command:
    - /bin/bash
    - -c
    - |
      echo "=========================================="
      echo "Skupper PostgreSQL Demo - Client Pod"
      echo "=========================================="
      echo ""
      echo "Connecting to PostgreSQL via Skupper..."
      echo "Target service: postgres:5432"
      echo "Database: demodb"
      echo ""

      export PGPASSWORD=demopass

      while true; do
        echo "[$(date '+%Y-%m-%d %H:%M:%S')] Attempting connection..."
        if psql -h postgres -p 5432 -U demouser -d demodb -c "SELECT id, message, created_at FROM demo_data ORDER BY id;" 2>&1; then
          echo ""
          echo "✓ SUCCESS! Connected to PostgreSQL on Raspberry Pi via Skupper!"
          echo "=========================================="
        else
          echo "✗ Connection failed"
          echo "=========================================="
        fi
        echo ""
        sleep 30
      done
    env:
    - name: PGPASSWORD
      value: "demopass"
